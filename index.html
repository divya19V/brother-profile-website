<!DOCTYPE html>
<html>
<head>
    <title>Manjunath & associates com.</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Verdana, sans-serif;

            background-image: url("background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        img {
            width: 150px;
            border-radius: 50%;
        }

        h1 {
            color: white;
            position: absolute;
            top: 40%;
            right: 200px;
            color: white;
        }

        .section {
            position: absolute;
            right: 350px;
            top: 55%;
            transform: translateY(-50%); 
            display: flex;
            flex-direction: row;
            gap: 10px;
        }

        button {
            font-size: 20px;
            padding: 10px 15px; /* makes button bigger */
        }

        .skills span {
            background: #007BFF;
            color: white;
            padding: 5px 10px;
            margin: 5px;
            display: inline-block;
            border-radius: 5px;
        }

        .content {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 10px;
            width: 60%;
        }
        
    </style>
</head>

<body>
    <h1>Manjunath & associates com.</h1>
    <div id="intro" class="content"> 
    <h2>About Us</h2>
    <p>Manjunath & Associates is a company focused on ...</p>
    </div>

    <div id="projects" class="content" style="display:none;">
        <h2>Projects</h2>
        <p>Project 1, Project 2...</p>
    </div>

    <div id="contact" class="content" style="display:none;">
        <h2>Contact</h2>
        <p>Email: example@email.com</p>
    </div>
    <div class="section">
        <button onclick="showSection('intro')">About Us</button>
        <button onclick="showSection('projects')">Projects</button>
        <button onclick="showSection('contact')">Contact</button>
        <script>
        function showSection(sectionId) {
            // hide all sections
            const sections = document.querySelectorAll('.content');
            sections.forEach(sec => sec.style.display = 'none');

            // show selected section
            document.getElementById(sectionId).style.display = 'block';
        }
        </script>
    </div>
</body>
</html>
